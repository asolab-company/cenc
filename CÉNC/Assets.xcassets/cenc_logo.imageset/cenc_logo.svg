<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 110" height="110" width="300">
  <style>
    .draw-path {
      fill: transparent; /* Сначала пусто внутри */
      stroke: black;     /* Рисуем черной обводкой */
      stroke-width: 1.5px;
      stroke-dasharray: 1000; /* Длина пунктира */
      stroke-dashoffset: 1000; /* Сдвигаем пунктир, чтобы скрыть линию */
      animation: drawAndFill 3s ease-in-out infinite;
    }

    @keyframes drawAndFill {
      0% {
        stroke-dashoffset: 1000;
        fill: transparent;
      }
      40% {
        stroke-dashoffset: 0; /* Линия нарисовалась полностью */
        fill: transparent;
      }
      60% {
        fill: black; /* Плавно заливаем черным */
        stroke-width: 0; /* Убираем обводку */
      }
      80% {
         opacity: 1;
      }
      100% {
         opacity: 0; /* Исчезает для повтора */
      }
    }
    
    /* Добавляем небольшую задержку для каждой буквы */
    .part-1 { animation-delay: 0s; }
    .part-2 { animation-delay: 0.2s; }
    .part-3 { animation-delay: 0.4s; }
    .part-4 { animation-delay: 0.6s; }
  </style>

